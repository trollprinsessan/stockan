<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocksunds IF — Content Generator</title>
<style>
  @font-face {
    font-family: 'Helvetica Neue';
    src: local('Helvetica Neue Bold'), local('HelveticaNeue-Bold');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'Helvetica Neue';
    src: local('Helvetica Neue'), local('HelveticaNeue');
    font-weight: 400;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    color: #111;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  .app {
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
  }

  .sidebar h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #111;
    margin-bottom: 4px;
  }

  .sidebar h2 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 10px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
  }

  .field textarea,
  .field input[type="text"] {
    background: #f5f5f5;
    border: 1px solid #ddd;
    color: #111;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 4px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .field textarea:focus,
  .field input[type="text"]:focus {
    border-color: #F6BA3F;
  }
  .field textarea { min-height: 80px; }

  /* COLOR SWATCHES */
  .color-options { display: flex; gap: 8px; }
  .color-swatch {
    width: 36px; height: 36px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: #F6BA3F; }
  .color-swatch[data-color="white"] { background: #fff; }
  .color-swatch[data-color="black"] { background: #000; border: 2px solid #ddd; }
  .color-swatch.active[data-color="black"] { border-color: #F6BA3F; }
  .color-swatch[data-color="yellow"] { background: #F6BA3F; }

  /* FORMAT BUTTONS */
  .format-options { display: flex; gap: 8px; }
  .format-btn {
    flex: 1;
    padding: 10px 0;
    background: #f5f5f5;
    border: 1px solid #ddd;
    color: #999;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .format-btn:hover { border-color: #bbb; color: #333; }
  .format-btn.active { background: #F6BA3F; color: #000; border-color: #F6BA3F; }

  /* TOGGLE */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toggle {
    width: 40px; height: 22px;
    background: #ccc;
    border-radius: 11px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.active { background: #F6BA3F; }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.active::after { transform: translateX(18px); }
  .toggle-label {
    font-size: 12px;
    color: #666;
    font-weight: 400;
  }

  /* IMAGE UPLOAD */
  .upload-area {
    border: 2px dashed #ddd;
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .upload-area:hover { border-color: #bbb; }
  .upload-area.has-image { border-style: solid; border-color: #F6BA3F; }
  .upload-area input { display: none; }
  .upload-area span {
    font-size: 12px;
    color: #999;
    display: block;
  }
  .upload-area .filename {
    color: #F6BA3F;
    font-size: 11px;
    margin-top: 4px;
    word-break: break-all;
  }
  .remove-image {
    position: absolute;
    top: 8px; right: 8px;
    width: 20px; height: 20px;
    background: #ddd;
    border: none;
    color: #666;
    font-size: 14px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .remove-image:hover { background: #c00; color: #fff; }

  /* SLIDERS */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .slider-row label {
    font-size: 11px;
    font-weight: 700;
    color: #999;
    width: 36px;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #F6BA3F;
    border-radius: 50%;
    cursor: pointer;
  }

  /* EXPORT BUTTON */
  .export-btn {
    padding: 14px 0;
    background: #F6BA3F;
    border: none;
    color: #000;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    width: 100%;
  }
  .export-btn:hover { opacity: 0.85; }

  .export-btns { display: flex; gap: 8px; }
  .export-btns .export-btn { flex: 1; }

  /* CANVAS AREA */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    overflow: auto;
  }

  .canvas-wrapper {
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  /* THE ACTUAL CANVAS */
  canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div>
      <h1>Stocksunds IF</h1>
      <p style="font-size:11px;color:#bbb;margin-top:2px;">Content Generator</p>
    </div>

    <div class="field">
      <h2>Format</h2>
      <div class="format-options">
        <button class="format-btn active" data-format="square" onclick="setFormat('square')">4:5 Post<br><span style="font-weight:400;font-size:10px;color:inherit;opacity:0.6">1080 x 1350</span></button>
        <button class="format-btn" data-format="story" onclick="setFormat('story')">9:16 Story<br><span style="font-weight:400;font-size:10px;color:inherit;opacity:0.6">1080 x 1920</span></button>
        <button class="format-btn" data-format="wide" onclick="setFormat('wide')">16:9 Wide<br><span style="font-weight:400;font-size:10px;color:inherit;opacity:0.6">1920 x 1080</span></button>
      </div>
    </div>

    <div class="field">
      <h2>Rubrik</h2>
      <textarea id="headline" placeholder="STOCKSUNDS IF&#10;– FC VÄSBY&#10;AKADEMISKA" oninput="render()"></textarea>
    </div>

    <div class="field">
      <h2>Info (nedre text)</h2>
      <input type="text" id="subtext" placeholder="Lördagen 28 September. 13:00 Stockhagen" oninput="render()">
      <div class="toggle-row" style="margin-top:4px;">
        <div class="toggle" id="boldToggle" onclick="toggleBold()"></div>
        <span class="toggle-label">Bold</span>
      </div>
    </div>

    <div class="field">
      <h2>Bakgrundsfärg</h2>
      <div class="color-options">
        <div class="color-swatch active" data-color="yellow" onclick="setColor('yellow')"></div>
        <div class="color-swatch" data-color="white" onclick="setColor('white')"></div>
        <div class="color-swatch" data-color="black" onclick="setColor('black')"></div>
      </div>
    </div>

    <div class="field">
      <h2>Bakgrundsbild</h2>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)">
        <span id="uploadText">Klicka eller dra en bild hit</span>
      </div>
    </div>

    <div class="field" id="imageControls" style="display:none;">
      <h2>Bildposition & storlek</h2>
      <div class="slider-row">
        <label>X</label>
        <input type="range" id="imgX" min="-100" max="100" value="0" oninput="updateImagePos()">
      </div>
      <div class="slider-row">
        <label>Y</label>
        <input type="range" id="imgY" min="-100" max="100" value="0" oninput="updateImagePos()">
      </div>
      <div class="slider-row">
        <label>Zoom</label>
        <input type="range" id="imgScale" min="100" max="300" value="100" oninput="updateImagePos()">
      </div>
    </div>

    <div class="field">
      <h2>Bild-overlay</h2>
      <div class="toggle-row">
        <div class="toggle active" id="overlayToggle" onclick="toggleOverlay()"></div>
        <span class="toggle-label">Mörkt overlay</span>
      </div>
    </div>

    <div class="field">
      <h2>Logga</h2>
      <div class="toggle-row">
        <div class="toggle active" id="logoToggle" onclick="toggleLogo()"></div>
        <span class="toggle-label">Visa logga</span>
      </div>
    </div>

    <div style="margin-top:auto;">
      <div class="export-btns">
        <button class="export-btn" onclick="exportImage()">Exportera PNG</button>
      </div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>
  </div>
</div>

  // --- CONTROLS ---
  function setFormat(f) {
    state.format = f;
    document.querySelectorAll('.format-btn').forEach(b => b.classList.toggle('active', b.dataset.format === f));
    render();
  }

  function setColor(c) {
    state.bgColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === c));
    render();
  }

  function toggleBold() {
    state.subtextBold = !state.subtextBold;
    document.getElementById('boldToggle').classList.toggle('active', state.subtextBold);
    render();
  }

  function toggleOverlay() {
    state.overlay = !state.overlay;
    document.getElementById('overlayToggle').classList.toggle('active', state.overlay);
    render();
  }

  function toggleLogo() {
    state.showLogo = !state.showLogo;
    document.getElementById('logoToggle').classList.toggle('active', state.showLogo);
    render();
  }

  function updateImagePos() {
    state.imgX = parseInt(document.getElementById('imgX').value);
    state.imgY = parseInt(document.getElementById('imgY').value);
    state.imgScale = parseInt(document.getElementById('imgScale').value);
    render();
  }

  function showImageControls(show) {
    document.getElementById('imageControls').style.display = show ? 'flex' : 'none';
  }

  function resetImageControls() {
    state.imgX = 0; state.imgY = 0; state.imgScale = 100;
    document.getElementById('imgX').value = 0;
    document.getElementById('imgY').value = 0;
    document.getElementById('imgScale').value = 100;
  }

  function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        state.bgImage = img;
        resetImageControls();
        showImageControls(true);
        const area = document.getElementById('uploadArea');
        area.classList.add('has-image');
        area.innerHTML = `
          <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)">
          <button class="remove-image" onclick="removeImage(event)">&times;</button>
          <span class="filename">${file.name}</span>
        `;
        render();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function removeImage(e) {
    e.stopPropagation();
    state.bgImage = null;
    resetImageControls();
    showImageControls(false);
    const area = document.getElementById('uploadArea');
    area.classList.remove('has-image');
    area.innerHTML = `
      <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)">
      <span id="uploadText">Klicka eller dra en bild hit</span>
    `;
    render();
  }

  // --- RENDER ---
  function render() {
    const headlineEl = document.getElementById('headline');
    const subtextEl = document.getElementById('subtext');
    state.headline = headlineEl.value;
    state.subtext = subtextEl.value;

    const fmt = FORMATS[state.format];
    canvas.width = fmt.w;
    canvas.height = fmt.h;

    // Scale factor for text relative to base (1350x1080)
    const baseW = 1350;
    const scale = fmt.w / baseW;
    // For story format, scale by height ratio instead to keep text proportional
    const textScale = state.format === 'story' ? Math.min(fmt.w / baseW, fmt.h / 1080 * 0.75) : scale;

    // Background
    if (state.bgImage) {
      const zoomFactor = state.imgScale / 100;
      const imgW = state.bgImage.width;
      const imgH = state.bgImage.height;
      const canvasRatio = fmt.w / fmt.h;
      const imgRatio = imgW / imgH;

      // Base cover dimensions (in image-space)
      let sw, sh;
      if (imgRatio > canvasRatio) {
        sh = imgH;
        sw = sh * canvasRatio;
      } else {
        sw = imgW;
        sh = sw / canvasRatio;
      }

      // Apply zoom (shrink the source rect = zoom in)
      sw /= zoomFactor;
      sh /= zoomFactor;

      // Center, then offset by X/Y (-100..100 maps to full pan range)
      const maxPanX = (imgW - sw) / 2;
      const maxPanY = (imgH - sh) / 2;
      const sx = (imgW - sw) / 2 - (state.imgX / 100) * maxPanX;
      const sy = (imgH - sh) / 2 - (state.imgY / 100) * maxPanY;

      ctx.drawImage(state.bgImage, sx, sy, sw, sh, 0, 0, fmt.w, fmt.h);

      // Overlay
      if (state.overlay) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, fmt.w, fmt.h);
      }
    } else {
      ctx.fillStyle = COLORS[state.bgColor];
      ctx.fillRect(0, 0, fmt.w, fmt.h);
    }

    // Determine text color
    let textColor = '#000';
    if (state.bgImage) {
      textColor = '#fff';
    } else if (state.bgColor === 'black') {
      textColor = '#fff';
    } else if (state.bgColor === 'white') {
      textColor = '#000';
    } else {
      textColor = '#000'; // yellow bg
    }

    // Logo — fixed 150x150, 90px from top, centered
    if (state.showLogo && logoLoaded) {
      const logoSize = 150;
      const logoX = (fmt.w - logoSize) / 2;
      const logoY = 90;
      ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);
    }

    // Headline
    if (state.headline) {
      const headlineFontSize = Math.round(90 * textScale);
      ctx.font = `700 ${headlineFontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
      ctx.fillStyle = textColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const lines = state.headline.toUpperCase().split('\n');
      const lineHeight = headlineFontSize * 1.1;
      const totalHeight = lines.length * lineHeight;
      const startY = fmt.h / 2 - totalHeight / 2 + lineHeight / 2;

      lines.forEach((line, i) => {
        ctx.fillText(line, fmt.w / 2, startY + i * lineHeight);
      });
    }

    // Subtext
    if (state.subtext) {
      const subFontSize = Math.round(35 * textScale);
      const weight = state.subtextBold ? '700' : '400';
      ctx.font = `${weight} ${subFontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
      ctx.fillStyle = textColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(state.subtext, fmt.w / 2, fmt.h - Math.round(60 * textScale));
    }
  }

  // --- EXPORT ---
  function exportImage() {
    const link = document.createElement('a');
    const fmt = FORMATS[state.format];
    const name = state.headline
      ? state.headline.replace(/\n/g, '-').replace(/[^a-zA-ZåäöÅÄÖ0-9-]/g, '').substring(0, 30).toLowerCase()
      : 'stocksunds-if';
    link.download = `${name}_${fmt.w}x${fmt.h}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // Initial render
  render();

  // Drag & drop
  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#F6BA3F'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const input = document.getElementById('imageInput');
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      handleImage({ target: input });
    }
  });
</script>

</body>
</html>
